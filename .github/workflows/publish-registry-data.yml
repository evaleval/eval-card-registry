name: Publish registry data

# Replaces seed.yml's inline-Python publish path with a dedicated
# script (scripts/publish_registry_data.py). Two triggers:
#
#   - On PRs that touch seed YAML or registry code: --dry-run + tests.
#     Catches schema breakage / parse failures before merge without
#     publishing.
#
#   - On push to main: real publish to evaleval/entity-registry-data.
#     Idempotent — the script reads the remote manifest.json and
#     skips the upload if content_hash hasn't changed.
#
# See notes/hierarchy-alignment.md §7 Step 2 for the design.

on:
  pull_request:
    branches: [main]
    paths:
      - "seed/**"
      - "src/eval_card_registry/cli.py"
      - "src/eval_card_registry/store/**"
      - "packages/eval-entity-resolver/**"
      - "scripts/publish_registry_data.py"
      - ".github/workflows/publish-registry-data.yml"
  push:
    branches: [main]
    paths:
      - "seed/**"
      - "src/eval_card_registry/cli.py"
      - "src/eval_card_registry/store/**"
      - "scripts/publish_registry_data.py"
      - ".github/workflows/publish-registry-data.yml"
  workflow_dispatch: {}

permissions:
  contents: read

# Cancel in-flight runs when a newer commit lands. The push and
# pull_request triggers share a group so a PR's dry-run doesn't run
# concurrently with the merge's real publish.
concurrency:
  group: publish-registry-data
  cancel-in-progress: true

jobs:
  dry-run:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # publish_registry_data.py reads `git rev-parse HEAD` for the
          # manifest's seed_git_sha. Default fetch-depth=1 is fine; full
          # history isn't required.
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest

      - name: Publish registry data (--dry-run)
        run: uv run python scripts/publish_registry_data.py --dry-run

      - name: Surface manifest in CI log
        run: cat fixtures/manifest.json

  publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync

      - name: Publish registry data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run python scripts/publish_registry_data.py

      # The deployed Space caches the parquet at boot. Restart so
      # /api/v1/resolve picks up the new revision. Non-fatal — if the
      # Space restart fails the data is already pushed and will load
      # on the next natural restart.
      - name: Restart entity-registry Space
        if: success()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python -c "
          from huggingface_hub import HfApi
          HfApi().restart_space('evaleval/entity-registry')
          " || echo "::warning::Space restart failed; will reload on next manual restart"
