name: Refresh hub-stats source

on:
  schedule:
    # Daily at 09:30 UTC — 30 min after refresh-models so a same-day
    # diff from each lands sequentially rather than racing the seed.yml
    # downstream trigger.
    - cron: "30 9 * * *"
  workflow_dispatch: {}

# Direct-commit auto-sync (no PR review). Switch to PR mode if human review of
# refreshes becomes warranted.
permissions:
  contents: write
  # `gh workflow run seed.yml` (downstream dispatch) requires actions:write.
  actions: write
  # The stall beacon (final steps) opens/closes a single sticky tracking issue.
  issues: write

env:
  GENERATED_PATH: seed/models/sources/hub_stats.generated.yaml
  STATE_PATH: seed/models/sources/hub_stats.state.json

concurrency:
  group: refresh-hub-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # The DuckDB query against the remote parquet can take a few minutes;
    # 15 is generous and bounded.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync

      - name: Refresh hub-stats generated source
        env:
          # Authenticated HF requests get ~30k/5min vs 500/5min unauth.
          # The script's DuckDB query streams parquet via many range
          # requests; without auth a single cycle can brush the limit
          # and another cron firing in the same window will trip it.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # --live: the cron's job is FRESHNESS, so it queries HF directly rather
        # than the committed offline cache (the script's default, used for
        # reproducible regens).
        run: uv run python scripts/refresh_from_hub_stats.py --live

      # SMOKE tier (must pass — RED on failure). The YAML must parse, the seed
      # loader must run, and the gate suite must COLLECT cleanly (catches import /
      # path / module-load breakage). A failure here is pipeline breakage, not a
      # data issue, so it stays loud RED to stand out from a routine skip.
      - name: Smoke checks (pipeline integrity)
        run: |
          uv run python -c "import yaml; yaml.safe_load(open('$GENERATED_PATH'))"
          # The frozen oracle is read at gate RUNTIME (inside a fixture/test
          # body, not at collection), so pytest --collect-only below would NOT
          # catch a missing/corrupt oracle. Assert it loudly HERE so a relocated/
          # missing-oracle regression fails as an INFRA error in this smoke step
          # (distinct from, and as loud as, a data-regression in the next step).
          uv run python -c "import json; from eval_card_registry.lib.seed_io import resolve_oracle_path as r; p=r(); assert p.exists(), f'oracle missing: {p}'; assert 'resolutions' in json.loads(p.read_text()), f'oracle malformed: {p}'"
          LOCAL_MODE=true uv run eval-card-registry seed --local
          LOCAL_MODE=true uv run pytest tests/test_gate_invariants.py --collect-only -q

      # REGRESSION gate — the invariant suite over the fixtures that the smoke
      # step's `seed --local` just wrote to fixtures/ (this step CONSUMES that
      # output; keep it after the smoke step). A regen that re-mints a shadow,
      # re-splits an org (e.g. reverts a same-uploader merge), or regresses a
      # known resolution outcome FAILS here and the named step turns the job RED,
      # so a stalled refresh is visible (not silently skipped). It is
      # distinguishable from pipeline breakage by WHICH step failed: a smoke-step
      # failure is infra; this step failing means "today's upstream would regress
      # data, so nothing was committed." A failure here halts the job before
      # Detect, so the commit/deploy steps never run.
      - name: Regression gate (blocks commit on data regression)
        run: LOCAL_MODE=true uv run pytest tests/test_gate_invariants.py -q

      - name: Detect changes
        id: diff
        run: |
          # Two output flags:
          #   data_changed → YAML changed; downstream seed.yml dispatch needed.
          #   state_changed → only the etag watermark moved (no parquet diff
          #                   matched our candidate set this cycle); commit it
          #                   alone so tomorrow's run can short-circuit.
          if git diff --quiet "$GENERATED_PATH"; then
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "data_changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat "$GENERATED_PATH"
          fi
          if git diff --quiet "$STATE_PATH" 2>/dev/null && [ -z "$(git status --porcelain "$STATE_PATH")" ]; then
            echo "state_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "state_changed=true" >> "$GITHUB_OUTPUT"
          fi
          if git diff --quiet "$GENERATED_PATH" && git diff --quiet "$STATE_PATH" 2>/dev/null && [ -z "$(git status --porcelain "$STATE_PATH")" ]; then
            echo "::notice::No changes to $GENERATED_PATH or $STATE_PATH — nothing to commit."
          fi

      - name: Commit + push directly
        if: steps.diff.outputs.data_changed == 'true' || steps.diff.outputs.state_changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$GENERATED_PATH" "$STATE_PATH"
          if [ "${{ steps.diff.outputs.data_changed }}" = "true" ]; then
            msg="chore(seed): refresh hub-stats source ($(date -u +%Y-%m-%d))"
          else
            msg="chore(seed): bump hub-stats etag watermark ($(date -u +%Y-%m-%d))"
          fi
          git commit -m "$msg"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      # GITHUB_TOKEN-authored pushes do NOT trigger downstream workflows.
      # Dispatch seed.yml explicitly so the refresh actually deploys.
      # Only on data changes — etag-only commits don't change what
      # canonical_models will look like after seed merge, so no need to
      # redeploy. A failed dispatch after a committed data refresh leaves it
      # undeployed — fail RED with a manual-fallback hint rather than swallow it.
      - name: Trigger seed deployment
        if: steps.diff.outputs.data_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run seed.yml --ref "${GITHUB_REF_NAME}" || {
            echo "::error::seed.yml dispatch failed after a committed refresh — deploy manually: gh workflow run seed.yml --ref ${GITHUB_REF_NAME}"
            exit 1
          }

      # Stall beacon — ONE sticky tracking issue (deduplicated by the
      # `refresh-hub-stats-stalled` label), never a new issue per run. ANY failed
      # step (infra / data-regression / commit / dispatch) opens-or-comments the
      # single issue. It is CLEARED only by a run that actually committed a DATA
      # change AND dispatched a deploy (success() && data_changed) — NOT by a
      # no-op or etag-only green day, so a committed-but-undeployed refresh
      # (dispatch failed) is not silently auto-closed before the deploy is
      # re-attempted. All `gh` calls are best-effort (|| true) so a beacon-side
      # API hiccup can't flip the run's real status.
      - name: Raise/refresh stall beacon
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          label="refresh-hub-stats-stalled"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body="refresh-hub-stats run FAILED on $(date -u +%F) — cause may be infra, a data-regression gate, or a deploy dispatch; inspect the run: ${run_url}. Auto-closes after a run that commits + deploys."
          gh label create "$label" --color FBCA04 --description "refresh-hub-stats cron is failing/blocked" 2>/dev/null || true
          num=$(gh issue list --label "$label" --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$num" ]; then
            gh issue comment "$num" --body "$body" || true
          else
            gh issue create --title "⚠️ refresh-hub-stats cron run failed" --label "$label" --body "$body" || true
          fi

      - name: Clear stall beacon
        if: success() && steps.diff.outputs.data_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          label="refresh-hub-stats-stalled"
          for num in $(gh issue list --label "$label" --state open --json number --jq '.[].number' 2>/dev/null || true); do
            gh issue comment "$num" --body "✅ Resolved on $(date -u +%F) — a refresh committed + deployed. Closing." || true
            gh issue close "$num" || true
          done
