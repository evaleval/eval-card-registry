name: Refresh models.dev source

on:
  schedule:
    # Daily at 09:00 UTC. Runs the full models.dev refresh: the non-catalog
    # re-cased rewrite of models_dev.generated.yaml followed by the additive
    # catalog split. Both are CORE-AWARE (they suppress/repoint mints colliding
    # with an existing canonical incl. core.yaml, so they only ADD coverage) and
    # the generator is deterministic across runs. Both are gated by the invariant
    # suite below — a regen that regresses a known resolution outcome / re-mints a
    # shadow canonical / re-splits an org ABORTS before commit, so a bad upstream
    # day skips rather than corrupts.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

# Direct-commit auto-sync (no PR review). Switch to PR mode if human review of
# refreshes becomes warranted.
permissions:
  contents: write
  # `gh workflow run seed.yml` (downstream dispatch step below) requires
  # actions:write — the default GITHUB_TOKEN only has actions:read, which
  # would fail silently via the `||` fallback.
  actions: write

env:
  GENERATED_PATH: seed/models/sources/models_dev.generated.yaml
  CATALOG_PATH: seed/models/sources/models_dev_catalog.generated.yaml
  ORGS_GEN_PATH: seed/orgs.generated.yaml

# Don't pile up runs if a previous one is mid-fetch.
concurrency:
  group: refresh-models-dev
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync

      # Step 1 — full re-cased rewrite of models_dev.generated.yaml. Core-aware:
      # suppresses/repoints any mint whose id collides (normalized or org-aware)
      # with an existing canonical (incl. core.yaml + the catalog), so it is
      # ADDITIVE and never clobbers curated ids. Fetches + caches the models.dev
      # snapshot for step 2 to reuse (so both run against the SAME pull).
      - name: Refresh models.dev source (full re-cased, core-aware)
        run: uv run python scripts/refresh_from_modelsdev.py

      # Step 2 — additive catalog split, reusing step 1's cached snapshot
      # (--no-fetch): existing canonical universe incl. core.yaml + the freshly
      # rewritten models_dev wins; mint only models.dev-only entries; reconcile
      # HF-derived community orgs.
      - name: Refresh models.dev catalog (additive, core-deduped)
        run: uv run python scripts/refresh_from_modelsdev.py --catalog --no-fetch

      # Sanity check: the regenerated YAML must parse and the seed loader
      # must succeed. If either fails we abort without committing — better
      # to skip a day's refresh than to break the seed.yml pipeline that
      # runs on every push to main.
      - name: Validate generated YAML loads + gate invariants
        run: |
          uv run python -c "import yaml; yaml.safe_load(open('$GENERATED_PATH'))"
          uv run python -c "import yaml; yaml.safe_load(open('$CATALOG_PATH'))"
          LOCAL_MODE=true uv run eval-card-registry seed --local
          # Gate the refresh on the invariant suite over the freshly-seeded
          # fixtures: a regen that re-mints a shadow, re-splits an org, or
          # regresses a known resolution outcome ABORTS here — better to skip a
          # day than commit a regression.
          LOCAL_MODE=true uv run pytest tests/test_gate_invariants.py -q

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet "$GENERATED_PATH" "$CATALOG_PATH" "$ORGS_GEN_PATH"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no generated files changed — nothing to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat "$GENERATED_PATH" "$CATALOG_PATH" "$ORGS_GEN_PATH"
          fi

      - name: Commit + push directly
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$GENERATED_PATH" "$CATALOG_PATH" "$ORGS_GEN_PATH"
          git commit -m "chore(seed): refresh models.dev source + catalog ($(date -u +%Y-%m-%d))"
          # If main moved while we were running, rebase rather than fail.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      # GITHUB_TOKEN-authored pushes do NOT trigger downstream workflows
      # by GH security policy. Dispatch seed.yml explicitly so the
      # refresh actually deploys to the HF Dataset repo + restarts the
      # Space. Best-effort: warn if dispatch fails (manual workflow_dispatch
      # is always available as fallback).
      - name: Trigger seed deployment
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run seed.yml --ref "${GITHUB_REF_NAME}" || echo "::warning::seed.yml dispatch failed; trigger manually"
