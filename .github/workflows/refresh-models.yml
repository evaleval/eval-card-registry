name: Refresh models.dev source

on:
  schedule:
    # Daily at 09:00 UTC. Runs the full models.dev refresh: the non-catalog
    # re-cased rewrite of models_dev.generated.yaml, the additive catalog
    # split, then the union-wide org reconcile. The rewrites are CORE-AWARE
    # (they suppress/repoint mints colliding with an existing canonical incl.
    # core.yaml), CARRY the committed output FORWARD (an upstream removal
    # retains the committed entry/aliases instead of deleting resolvable
    # surface forms), and the generator is deterministic across runs. All are
    # gated by the invariant suite below — a regen that regresses a known
    # resolution outcome / re-mints a shadow canonical / re-splits an org
    # ABORTS before commit, so a bad upstream day skips rather than corrupts.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

# Direct-commit auto-sync (no PR review). Switch to PR mode if human review of
# refreshes becomes warranted.
permissions:
  contents: write
  # `gh workflow run seed.yml` (downstream dispatch step below) requires
  # actions:write — the default GITHUB_TOKEN only has actions:read, which
  # would fail silently via the `||` fallback.
  actions: write
  # The stall beacon (final steps) opens/closes a single sticky tracking issue.
  issues: write

env:
  GENERATED_PATH: seed/models/sources/models_dev.generated.yaml
  CATALOG_PATH: seed/models/sources/models_dev_catalog.generated.yaml
  ORGS_GEN_PATH: seed/orgs.generated.yaml
  # Step 3's org canonicalization may rewrite org_id fields in the GENERATED
  # model sources; these are included in the diff/commit set so the committed
  # state always matches the state the gate suite passed on. core.yaml is
  # deliberately NOT here: the cron never writes the hand-curated file (it
  # reads it for authority and warns when a core spelling needs a manual fix).
  EXTRA_ORG_SYNC_PATHS: >-
    seed/models/sources/hf_oracle.generated.yaml
    seed/models/sources/hub_stats.generated.yaml
    seed/models/sources/tier3_inferred.generated.yaml

# Don't pile up runs if a previous one is mid-fetch.
concurrency:
  group: refresh-models-dev
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync

      # Step 1 — full re-cased rewrite of models_dev.generated.yaml. Core-aware:
      # suppresses/repoints any mint whose id collides (normalized or org-aware)
      # with an existing canonical (incl. core.yaml + the catalog), so it is
      # ADDITIVE and never clobbers curated ids. Fetches + caches the models.dev
      # snapshot for step 2 to reuse (so both run against the SAME pull).
      - name: Refresh models.dev source (full re-cased, core-aware)
        run: uv run python scripts/refresh_from_modelsdev.py

      # Step 2 — additive catalog split, reusing step 1's cached snapshot
      # (--no-fetch): existing canonical universe incl. core.yaml + the freshly
      # rewritten models_dev wins; mint only models.dev-only entries; reconcile
      # HF-derived community orgs.
      - name: Refresh models.dev catalog (additive, core-deduped)
        run: uv run python scripts/refresh_from_modelsdev.py --catalog --no-fetch

      # Step 3 — universal org reconcile (mirrors regenerate_sources.sh step 7a):
      # mint a community canonical_orgs row for every org_id referenced by ANY
      # model source that lacks one. Step 2's own reconciliation only covers its
      # fresh catalog mints, so a step-1 mint referencing a brand-new org (e.g.
      # a new models.dev provider) would otherwise leave a dangling org FK and
      # red the gate. Also canonicalizes org_id spellings across the GENERATED
      # model sources, hence EXTRA_ORG_SYNC_PATHS in the commit set (core.yaml
      # is read for authority, never written by the cron).
      - name: Reconcile orgs (union of all model sources)
        run: uv run python scripts/refresh_from_modelsdev.py --reconcile-orgs

      # SMOKE tier (must pass — RED on failure). The regenerated YAML must parse,
      # the seed loader must run, and the gate suite must COLLECT cleanly (catches
      # import / path / module-load breakage). A failure here is pipeline breakage,
      # not a data issue, so it stays loud RED to stand out from a routine skip.
      - name: Smoke checks (pipeline integrity)
        run: |
          uv run python -c "import yaml; yaml.safe_load(open('$GENERATED_PATH'))"
          uv run python -c "import yaml; yaml.safe_load(open('$CATALOG_PATH'))"
          # The frozen oracle is read at gate RUNTIME (inside a fixture/test
          # body, not at collection), so pytest --collect-only below would NOT
          # catch a missing/corrupt oracle. Assert it loudly HERE so a relocated/
          # missing-oracle regression fails as an INFRA error in this smoke step
          # (distinct from, and as loud as, a data-regression in the next step).
          uv run python -c "import json; from eval_card_registry.lib.seed_io import resolve_oracle_path as r; p=r(); assert p.exists(), f'oracle missing: {p}'; assert 'resolutions' in json.loads(p.read_text()), f'oracle malformed: {p}'"
          LOCAL_MODE=true uv run eval-card-registry seed --local
          LOCAL_MODE=true uv run pytest tests/test_gate_invariants.py --collect-only -q

      # REGRESSION gate — the invariant suite over the fixtures that the smoke
      # step's `seed --local` just wrote to fixtures/ (this step CONSUMES that
      # output; keep it after the smoke step). A regen that re-mints a shadow,
      # re-splits an org, or regresses a known resolution outcome FAILS here and
      # the named step turns the job RED, so a stalled refresh is visible (not
      # silently skipped). It is distinguishable from pipeline breakage by WHICH
      # step failed: a smoke-step failure is infra; this step failing means
      # "today's upstream would regress data, so nothing was committed." A failure
      # here halts the job before Detect, so the commit/deploy steps never run.
      - name: Regression gate (blocks commit on data regression)
        run: LOCAL_MODE=true uv run pytest tests/test_gate_invariants.py -q

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet "$GENERATED_PATH" "$CATALOG_PATH" "$ORGS_GEN_PATH" $EXTRA_ORG_SYNC_PATHS; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no generated files changed — nothing to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat "$GENERATED_PATH" "$CATALOG_PATH" "$ORGS_GEN_PATH" $EXTRA_ORG_SYNC_PATHS
          fi

      - name: Commit + push directly
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$GENERATED_PATH" "$CATALOG_PATH" "$ORGS_GEN_PATH" $EXTRA_ORG_SYNC_PATHS
          git commit -m "chore(seed): refresh models.dev source + catalog ($(date -u +%Y-%m-%d))"
          # If main moved while we were running, rebase rather than fail.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      # GITHUB_TOKEN-authored pushes do NOT trigger downstream workflows
      # by GH security policy. Dispatch seed.yml explicitly so the
      # refresh actually deploys to the HF Dataset repo + restarts the
      # Space. A failed dispatch here means a COMMITTED refresh is left
      # undeployed — a real, silent inconsistency — so fail RED with a
      # manual-fallback hint rather than swallowing it.
      - name: Trigger seed deployment
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run seed.yml --ref "${GITHUB_REF_NAME}" || {
            echo "::error::seed.yml dispatch failed after a committed refresh — deploy manually: gh workflow run seed.yml --ref ${GITHUB_REF_NAME}"
            exit 1
          }

      # Stall beacon — ONE sticky tracking issue (deduplicated by the
      # `refresh-models-stalled` label), never a new issue per run. ANY failed
      # step (infra / data-regression / commit / dispatch) opens-or-comments the
      # single issue. It is CLEARED only by a run that actually committed AND
      # dispatched a deploy (success() && changed) — NOT by a no-op green day, so
      # a committed-but-undeployed refresh (dispatch failed) is not silently
      # auto-closed before the deploy is re-attempted. All `gh` calls are
      # best-effort (|| true) so a beacon-side API hiccup can't flip the run's
      # real status.
      - name: Raise/refresh stall beacon
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          label="refresh-models-stalled"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body="refresh-models run FAILED on $(date -u +%F) — cause may be infra, a data-regression gate, or a deploy dispatch; inspect the run: ${run_url}. Auto-closes after a run that commits + deploys."
          gh label create "$label" --color FBCA04 --description "refresh-models cron is failing/blocked" 2>/dev/null || true
          num=$(gh issue list --label "$label" --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$num" ]; then
            gh issue comment "$num" --body "$body" || true
          else
            gh issue create --title "⚠️ refresh-models cron run failed" --label "$label" --body "$body" || true
          fi

      - name: Clear stall beacon
        if: success() && steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          label="refresh-models-stalled"
          for num in $(gh issue list --label "$label" --state open --json number --jq '.[].number' 2>/dev/null || true); do
            gh issue comment "$num" --body "✅ Resolved on $(date -u +%F) — a refresh committed + deployed. Closing." || true
            gh issue close "$num" || true
          done
