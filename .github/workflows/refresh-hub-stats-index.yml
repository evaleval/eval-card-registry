name: Refresh hub-stats id index

on:
  schedule:
    # Daily at 10:00 UTC — after the other refresh crons land their seed diffs.
    - cron: "0 10 * * *"
  workflow_dispatch: {}

# Publishes the single index file directly to the dataset repo + restarts the
# Space. Does NOT route through publish_registry_data.py (that owns the flat
# producer layout); this is a standalone subdir file for the read-only API.
permissions:
  contents: read
  # The stall beacon (final steps) opens/closes a single sticky tracking issue.
  issues: write

concurrency:
  group: refresh-hub-stats-index
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # The DuckDB COPY over the remote parquet (851K rows) can take several
    # minutes; 20 is generous and bounded.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync

      - name: Build hub-stats id index
        env:
          # Authenticated HF requests get ~30k/5min vs 500/5min unauth — the
          # DuckDB COPY streams the parquet via many range requests.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run python scripts/build_hub_stats_index.py

      # SMOKE: the parquet must parse and clear the row floor (the build script
      # already aborts below the floor without writing, so a present file should
      # always be above it; re-assert here so a corrupt/truncated write fails RED).
      - name: Smoke check (parquet parses + row floor)
        run: |
          uv run python - <<'PY'
          import sys
          import pandas as pd
          df = pd.read_parquet("fixtures/hub_stats_index.parquet")
          n = len(df)
          print(f"hub_stats_index rows: {n}")
          assert n >= 500000, f"row count {n} below 500K floor"
          for col in ("id", "id_norm"):
              assert col in df.columns, f"missing column: {col}"
          PY

      - name: Publish index + restart Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python - <<'PY'
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_file(
              path_or_fileobj="fixtures/hub_stats_index.parquet",
              path_in_repo="hub_stats_index/part-0.parquet",
              repo_id="evaleval/entity-registry-data",
              repo_type="dataset",
          )
          api.restart_space("evaleval/entity-registry")
          print("published hub_stats_index/part-0.parquet + restarted Space")
          PY

      # Stall beacon — ONE sticky tracking issue (deduplicated by the
      # `refresh-hub-stats-index-stalled` label), never a new issue per run. ANY
      # failed step opens-or-comments the single issue; a successful run clears it.
      - name: Raise/refresh stall beacon
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          label="refresh-hub-stats-index-stalled"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body="refresh-hub-stats-index run FAILED on $(date -u +%F) — cause may be the build (rate-limit / row floor), the smoke check, or the publish/restart; inspect the run: ${run_url}. Auto-closes after a successful run."
          gh label create "$label" --color FBCA04 --description "refresh-hub-stats-index cron is failing/blocked" 2>/dev/null || true
          num=$(gh issue list --label "$label" --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$num" ]; then
            gh issue comment "$num" --body "$body" || true
          else
            gh issue create --title "⚠️ refresh-hub-stats-index cron run failed" --label "$label" --body "$body" || true
          fi

      - name: Clear stall beacon
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          label="refresh-hub-stats-index-stalled"
          for num in $(gh issue list --label "$label" --state open --json number --jq '.[].number' 2>/dev/null || true); do
            gh issue comment "$num" --body "✅ Resolved on $(date -u +%F) — a refresh published the index. Closing." || true
            gh issue close "$num" || true
          done
