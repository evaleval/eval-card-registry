# Hand-curated overrides for seed/models.yaml.
#
# Why this file exists
# --------------------
# `seed/models.yaml` is generated from models.dev, which is strong on
# hosted-API model catalogs but underrepresents:
#   - Open-weight families released directly to HuggingFace without a
#     hosted-API counterpart (Meta Llama, Mistral / Mixtral open weights,
#     Qwen open weights, Gemma, Phi, Yi, OLMo, Falcon, Granite, SmolLM, …).
#   - Recent releases models.dev simply hasn't ingested yet (newer Qwen 3.x,
#     Gemini 3.x, Kimi K2.x, GLM-5, DeepSeek V3.1).
#
# The eval-cards backend pipeline sees these as HuggingFace-format raw
# model_ids. Without registry coverage they auto-draft, create review-queue
# noise, and prevent cross-evaluation rollups. Add entries here for any
# model the pipeline meaningfully sees. **Prioritize correct expected
# coverage of what EEE contains over the bounds of any single upstream
# catalog.** models.dev is one input, not the source of truth.
#
# Naming rule (apply consistently — working rule, revisable)
# ----------------------------------------------------------
# `canonical_id` = the lab's official **lineage name**, slugified
# (lowercase, hyphens, dots dropped). Specifically:
#
#   - Size / variant name / context length go in the id IFF the lab puts
#     them in their own model name. Llama publishes `Llama-3.1-8B-Instruct`
#     (size in the name) → id includes `-8b`. DeepSeek's small V2 variant is
#     `DeepSeek-V2-Lite` (variant "Lite", not "16B") → id `deepseek-v2-lite`.
#
#   - Training-stage suffixes — `-instruct`, `-chat`, `-it`, `-base` — are
#     **stripped from canonical**. Base and instruct fine-tunes share one
#     canonical because they're the same pretrained lineage. The resolver's
#     fuzzy stem strips these the same way it strips dated snapshots /
#     hosting tags / mode qualifiers. The `-Instruct`/`-Chat` raw forms are
#     listed as aliases for exact-match speed but the canonical is the
#     lineage name.
#
#   - Distinct sizes (8B ≠ 70B), distinct generations (3.1 ≠ 3.2), distinct
#     variants (Pro ≠ Flash, Lite ≠ Pro, Mini ≠ Medium) all stay separate
#     canonicals — these are different models, not different training
#     stages of the same model.
#
# `aliases`:
#   - Casing variants
#   - HF org-prefix variants (`meta-llama/...` rewritten to `meta/...` by
#     resolver `_ORG_ALIASES`; this list captures the spelling for
#     exact-match speed)
#   - Dated snapshots and `-Instruct`/`-Chat`/`-it` raw forms (handled by
#     fuzzy stem too, listed for exact-match)
#   - Hosting suffixes (`-turbo`, `-bedrock`)

skip_ids: []

