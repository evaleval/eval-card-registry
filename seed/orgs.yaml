# Known canonical orgs — pre-populated on seed.
#
# `id` is the canonical org slug. Match models.dev provider slugs where they
# exist (anthropic, openai, google, etc.) so the models seed generator
# (scripts/refresh_from_modelsdev.py) can map provider -> org_id by name.
#
# `aliases` covers the casing/whitespace variants and formal names that show
# up as `source_metadata.source_organization_name` in EEE records, plus HF
# org variants (e.g. `meta-llama` is HF's org for Meta's Llama models, mapped
# to canonical `meta`).
#
# This is an ongoing seed: add new orgs as EEE surfaces them, or as new model
# providers ship. Re-seeding is idempotent — `uv run eval-card-registry seed
# --local` merges new entries and prunes removed ones.

