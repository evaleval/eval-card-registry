# ============================================================
# Phase 1.5 (Session 5h) — AIME year-split + generic alias removal (2026-05-01)
# ============================================================
#
# Two fixes this round; all changes are direct edits to source blocks
# (NOT merge appends), because removals are required and merges union.
#
# 1) AIME-by-year canonicalization
#    --------------------------------
#    Problem: AIME-2025 rows were split between two canonicals.
#      - vals_ai_aime_aime_2024 / vals_ai_aime_aime_2025 → bare 'aime'
#      - artificial_analysis_llms_artificial_analysis_aime_25 → 'aime-25'
#      - llm_stats_aime_2025 → 'aime-25'
#      - llm_stats_aime_2024 → 'aime-2024'
#    Same year, two canonicals — cross-suite identity broken.
#
#    Decision: year-explicit canonicals. AIME-2024 → 'aime-2024';
#    AIME-2025 → 'aime-2025' (renamed from 'aime-25'); AIME-2026 →
#    'aime-2026'. Bare 'aime' kept as a parent / cross-year canonical
#    for cases where the year is not specified (vals.ai overall,
#    artificial_analysis.aime cross-year leaderboard rows, generic
#    "AIME" mentions). Year-specific aliases removed from bare 'aime'.
#
#    Edits made:
#      - 'aime-25' canonical RENAMED to 'aime-2025' (line ~1374) with
#        comprehensive aliases: aime-25, aime_25, AIME 2025, aime-2025,
#        aime_2025, aime 2025, artificial_analysis.aime_25,
#        artificial_analysis_aime_25, Aime aime 2025,
#        vals_ai_aime_aime_2025, llm_stats_aime_2025.
#      - 'aime-2024' aliases EXTENDED (line ~2582) to include AIME-24
#        short forms, vals.ai forms, and 'Aime aime 2024'.
#      - 'aime-2026' aliases EXTENDED (line ~2595) to include AIME-26
#        short forms.
#      - vals.ai 'aime' merge block (line ~23463) TRIMMED to remove
#        year-specific aliases (vals_ai_aime_aime_2024,
#        vals_ai_aime_aime_2025, "Aime aime 2024", "Aime aime 2025"),
#        leaving only true cross-year identifiers
#        (vals.ai/aime, vals_ai_aime, vals_ai_aime_overall, Aime overall).
#      - parent_benchmark_id linkages: each year canonical points to
#        bare 'aime'. (aime-2024 was previously parent_benchmark_id:
#        null; now parent_benchmark_id: aime, matching aime-2025 and
#        aime-2026.)
#
#    Deploy note (per evalcard-registry/CLAUDE.md): renaming
#    'aime-25' → 'aime-2025' triggers the seed loader's
#    rename-collision branch — the first seed run does stale-removal,
#    the second adds the freed raw_values under the new canonical.
#    Re-run seed twice on push, then restart the Space.
#
# 2) Bare 'core' alias removal
#    --------------------------
#    Problem: 'core' canonical (display_name: CoRe) had a bare 'core'
#    alias that swallowed any future benchmark or subset literally
#    named "core". 120 corpus rows currently resolve here from
#    eval_summary_id 'core' (alphaxiv source); the underlying
#    benchmark identity is GraCoRe with a leaf_key of 'core', so the
#    resolution was incidental, not intentional.
#
#    Edit made: bare 'core' alias REPLACED with 'CoRe' (display-name
#    form). Slug-form 'core-bench' family is unaffected (separate
#    canonical at line ~908).
#
#    Consequence: those 120 alphaxiv rows lose their 'core' canonical
#    resolution and revert to canonical_benchmark_id: null. The right
#    long-term fix is to wire alphaxiv's GraCoRe records to the
#    existing 'gracore' canonical (line ~9219); that requires a
#    pipeline-side or scoped-alias change, not a registry edit.
#
# Skipped this round (raised separately):
#   - vals-index / vals-multimodal-index / helm-instruct composite
#     canonicals absorbing sub-tasks. That's a policy decision worth
#     its own task.
