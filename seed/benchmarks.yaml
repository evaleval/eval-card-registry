- id: swe-bench-verified-mini-hal
  display_name: SWE-bench Verified (Mini)
  # HAL / Princeton's curated 50-task subset. Renamed on 2026-04-30
  # from ``swe-bench-verified-mini`` because the bare canonical id is
  # implicitly aliased back to itself by the seed loader, which
  # collided with MariusHobbhahn's separately-maintained variant
  # (different 50-task subset, distributed at the bare HF path
  # ``MariusHobbhahn/swe-bench-verified-mini``). With distinguishing
  # ``-hal`` suffix on this canonical id, Marius's bare-string aliases
  # resolve cleanly to ``swebench-verified-mini-mariushobbhahn``.
  #
  # Both HAL and Marius have aliases that normalize to the same key
  # ``swe_bench_verified_mini``. Disambiguation depends on the resolver's
  # exact_match (strategy="exact") matching the literal raw_value first,
  # before normalized_match (which is order-dependent and can't pick
  # between collisions). Each canonical's aliases must be the HAL/Marius
  # branding the upstream actually emits, and the literal raw_value
  # match is the tiebreaker.
  aliases:
    - "SWE-bench Verified Mini"
    - "SWE-bench Verified (Mini)"
    - "hal-swebench-verified-mini"
  description: HAL's 50-task random subset of SWE-bench Verified for cheap evaluation; hosted at hal.cs.princeton.edu/swebench_verified_mini. Distinct from MariusHobbhahn's ``swe-bench-verified-mini`` HF dataset (a different 50-task subset).
